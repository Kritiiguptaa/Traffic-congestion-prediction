<script>
const API = ""; // same origin

const map = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

let clusterMarkers = [];
let queryMarker = null;

function riskColor(score){
  if(score >= 0.45) return getComputedStyle(document.documentElement).getPropertyValue('--high').trim();
  if(score >= 0.25) return getComputedStyle(document.documentElement).getPropertyValue('--medium').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--low').trim();
}
function riskLabel(score){
  if(score >= 0.45) return 'high';
  if(score >= 0.25) return 'medium';
  return 'low';
}

async function loadClusters(){
  const res = await fetch(`${API}/api/clusters`);
  const data = await res.json();
  clusterMarkers.forEach(m => map.removeLayer(m));
  clusterMarkers = [];

  data.clusters.forEach(c => {
    const color = riskColor(c.avg_impact);
    const radius = Math.min(22, 6 + Math.sqrt(c.violations));
    const marker = L.circleMarker([c.latitude, c.longitude], {
      radius, color, fillColor: color, fillOpacity: 0.55, weight: 1.5
    }).addTo(map);

    marker.bindPopup(`
      <div class="popup-title">${c.location || c.police_station}</div>
      <div>Police station: <b>${c.police_station}</b></div>
      <div>Junction: <b>${c.junction_name || '—'}</b></div>
      <div>Violations recorded: <b>${c.violations}</b></div>
      <div>Avg severity: <span class="popup-score">${c.avg_impact}</span></div>
    `);
    clusterMarkers.push(marker);
  });

  document.getElementById('statusText').textContent =
    `${data.clusters.length} hotspots · updated ${new Date(data.last_loaded).toLocaleTimeString()}`;
}

async function refreshData(){
  document.getElementById('statusText').textContent = 'Refreshing…';
  await fetch(`${API}/api/refresh`, { method: 'POST' });
  await loadClusters();
}

document.getElementById('refreshBtn').addEventListener('click', refreshData);

// ---- time input default ----
const timeInput = document.getElementById('timeInput');
function setNow(){
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  timeInput.value = now.toISOString().slice(0,16);
}
setNow();
document.getElementById('nowBtn').addEventListener('click', setNow);

// ---- search / geocode ----
const searchInput = document.getElementById('searchInput');
const suggestionsEl = document.getElementById('suggestions');
let searchDebounce = null;
let selectedLocation = null; // {lat, lng, label}

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  if(q.length < 2){ suggestionsEl.style.display = 'none'; return; }
  searchDebounce = setTimeout(async () => {
    const res = await fetch(`${API}/api/geocode?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    renderSuggestions(data.results);
  }, 200);
});

function renderSuggestions(results){
  if(!results.length){ suggestionsEl.style.display = 'none'; return; }
  suggestionsEl.innerHTML = results.map((r,i) => `
    <div class="suggestion-item" data-idx="${i}">
      <div class="suggestion-title">${r.label}</div>
      <div class="suggestion-sub">${r.police_station}${r.junction_name && r.junction_name !== 'No Junction' ? ' · ' + r.junction_name : ''}</div>
    </div>
  `).join('');
  suggestionsEl.style.display = 'block';
  [...suggestionsEl.querySelectorAll('.suggestion-item')].forEach((el, i) => {
    el.addEventListener('click', () => {
      const r = results[i];
      selectedLocation = { lat: r.latitude, lng: r.longitude, label: r.label };
      searchInput.value = r.label;
      suggestionsEl.style.display = 'none';
      map.flyTo([r.latitude, r.longitude], 15, { duration: 0.6 });
      runPrediction();
    });
  });
}

document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')) suggestionsEl.style.display = 'none';
});

// click anywhere on the map to query that point
map.on('click', (e) => {
  selectedLocation = { lat: e.latlng.lat, lng: e.latlng.lng, label: `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}` };
  searchInput.value = selectedLocation.label;
  runPrediction();
});

timeInput.addEventListener('change', () => { if(selectedLocation) runPrediction(); });

async function runPrediction(){
  if(!selectedLocation) return;
  const when = timeInput.value; // already local ISO-ish
  const url = `${API}/api/predict?lat=${selectedLocation.lat}&lng=${selectedLocation.lng}&when=${encodeURIComponent(when)}`;
  const res = await fetch(url);
  const data = await res.json();
  showResult(selectedLocation.label, data);

  if(queryMarker) map.removeLayer(queryMarker);
  queryMarker = L.marker([selectedLocation.lat, selectedLocation.lng]).addTo(map);
}

function showResult(label, data){
  const card = document.getElementById('resultCard');
  card.classList.add('visible');
  document.getElementById('resultLocationName').textContent = label;

  const pill = document.getElementById('riskPill');
  pill.textContent = data.risk_level;
  pill.className = `risk-pill risk-${data.risk_level}`;

  document.getElementById('resultScore').textContent = data.predicted_score;

  let meta = `Severity profile: <b>${data.severity_score}</b> (${data.severity_source.replace('_',' ')})<br>`;
  meta += `Activity likelihood: <b>${data.activity_factor}</b> (${data.activity_source.replace('_',' ')})<br>`;
  if(data.nearest_cluster_id !== null && data.nearest_cluster_id !== undefined){
    meta += `Nearest known hotspot: <b>${Math.round(data.nearest_cluster_distance_m)}m</b> away`;
    if(data.historical_sample_size > 0) meta += ` · ${data.historical_sample_size} past records at this time slot`;
  } else {
    meta += `No known hotspot nearby — estimate from city-wide model`;
  }
  document.getElementById('resultMeta').innerHTML = meta;
}

// initial load
loadClusters();
</script>
</body>
</html> -->

  clusterMarkers.forEach(m => map.removeLayer(m));

  if(heatLayer){ map.removeLayer(heatLayer); heatLayer = null; }

  heatLayer = L.layerGroup();  // per-cluster glow circles, colored like markers, no additive saturation

  data.clusters.forEach(c => {
    // const color = riskColor(c.avg_impact);
    const color = riskColor(c.predicted_score);
    const radius = Math.min(22, 6 + Math.sqrt(c.violations));
    const marker = L.circleMarker([c.latitude, c.longitude], {
      radius, color, fillColor: color, fillOpacity: 0.55, weight: 1.5
    }).addTo(map);

    marker.bindPopup(`
      <div class="popup-title">${c.location || c.police_station}</div>
      <div>Police station: <b>${c.police_station}</b></div>
      <div>Junction: <b>${c.junction_name || '—'}</b></div>
      <div>Violations recorded: <b>${c.violations}</b></div>
      <div>Predicted impact (at selected time): <span class="popup-score">${c.predicted_score}</span></div>
      <div>Avg severity: <span class="popup-score">${c.avg_impact}</span></div>
    `);
    marker.on('click', () => {
      selectedLocation = { lat: c.latitude, lng: c.longitude, label: c.location || c.police_station };
      searchInput.value = selectedLocation.label;
      runPrediction();
    });
    clusterMarkers.push(marker);

    // normalize cluster_score to 0-1 for heat intensity, weighted toward severity not just volume
    // const intensity = Math.max(0.4, c.cluster_score / maxScore);
    // const intensity = Math.max(0.4, c.predicted_score / maxScore);
    // const intensity = Math.max(0.05, Math.min(1, c.predicted_score));
    // OLD additive L.heatLayer approach (saturated to red on overlap):
    // const intensity = c.predicted_score >= 0.4 ? 1.0 : (c.predicted_score >= 0.15 ? 0.55 : 0.18);
    // heatPoints.push([c.latitude, c.longitude, intensity]);

    // NEW: one soft glow disc per cluster, colored by the SAME riskColor() the markers use.
    // Size scales a little with violations; color updates with time exactly like the markers.
    const glowPx = 38 + Math.min(34, Math.sqrt(c.violations));
    const glowIcon = L.divIcon({
      className: '',
      html: `<div class="heat-glow" style="width:${glowPx}px;height:${glowPx}px;background:radial-gradient(circle, ${color} 0%, ${color} 35%, transparent 72%);"></div>`,
      iconSize: [glowPx, glowPx],
      iconAnchor: [glowPx/2, glowPx/2],
    });
    L.marker([c.latitude, c.longitude], { icon: glowIcon, interactive: false }).addTo(heatLayer);
  });

    // if(typeof L.heatLayer !== 'function'){
    // console.error('L.heatLayer is not available — the leaflet.heat plugin failed to load. Heatmap will be skipped; markers still work.');
    // document.getElementById('heatToggle').disabled = true;
    // document.getElementById('heatToggle').checked = false;
    // document.getElementById('statusText').textContent =
    // `${data.clusters.length} hotspots (heatmap plugin failed to load — markers only) · ${new Date(data.last_loaded).toLocaleTimeString()}`;
    // } else {

    // // radius: 18, blur: 14, maxZoom: 17, minOpacity: 0.55,
    // // gradient: { 0.0: '#3b8f5c', 0.35: '#d29922', 0.6: '#d6463a', 0.85: '#a8281f', 1.0: '#7a1410' }
    // // radius: 20, blur: 16, maxZoom: 17, minOpacity: 0.75,
    // // gradient: { 0.0: '#2d6b46', 0.3: '#b8821a', 0.55: '#b8362c', 0.8: '#7a1410', 1.0: '#4a0a08' }
    // // radius: 22, blur: 18, maxZoom: 17, minOpacity: 0.45,
    // // gradient: { 0.0: '#3b8f5c', 0.3: '#7fae3e', 0.5: '#d29922', 0.7: '#d6463a', 1.0: '#921f17' }
    // // radius: 22, blur: 18, maxZoom: 19, minOpacity: 0.55,
    // // gradient: { 0.0: '#3b8f5c', 0.3: '#7fae3e', 0.5: '#d29922', 0.7: '#d6463a', 1.0: '#921f17' }
    // // radius: 22, blur: 18, maxZoom: 19, minOpacity: 0.55,
    // // gradient: { 0.0: '#3b8f5c', 0.12: '#7fae3e', 0.25: '#d29922', 0.4: '#d6463a', 0.6: '#921f17' }

    // // gradient: { 0.0: '#3b8f5c', 0.15: '#7fae3e', 0.28: '#d29922', 0.4: '#d6463a', 0.6: '#921f17' }
    // // radius: 22, blur: 18, maxZoom: 19, minOpacity: 0.55, max: 1,

  if(document.getElementById('heatToggle').checked) heatLayer.addTo(map);
  document.getElementById('statusText').textContent =
    `${data.clusters.length} hotspots \u00b7 updated ${new Date(data.last_loaded).toLocaleTimeString()}`;

  clusterMarkers.forEach(m => {
    if(!document.getElementById('markersToggle').checked) map.removeLayer(m);
  });
}

document.getElementById('heatToggle').addEventListener('change', (e) => {
  if(!heatLayer) return;
  if(e.target.checked) heatLayer.addTo(map);
  else map.removeLayer(heatLayer);
});

document.getElementById('markersToggle').addEventListener('change', (e) => {
  clusterMarkers.forEach(m => {
    if(e.target.checked) m.addTo(map);
    else map.removeLayer(m);
  });
});

async function refreshData(){
  document.getElementById('statusText').textContent = 'Refreshing…';
  await fetch(`${API}/api/refresh`, { method: 'POST' });
  await loadClusters();
}

document.getElementById('refreshBtn').addEventListener('click', refreshData);

// ---- time input default ----
const timeInput = document.getElementById('timeInput');
function setNow(){
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  timeInput.value = now.toISOString().slice(0,16);
}
setNow();
// document.getElementById('nowBtn').addEventListener('click', setNow);
document.getElementById('nowBtn').addEventListener('click', () => {
  setNow();
  loadClusters();
  if(selectedLocation) runPrediction();
});

// ---- search / geocode ----
const searchInput = document.getElementById('searchInput');
const suggestionsEl = document.getElementById('suggestions');
let searchDebounce = null;
let selectedLocation = null; // {lat, lng, label}

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  if(q.length < 2){ suggestionsEl.style.display = 'none'; return; }
  searchDebounce = setTimeout(async () => {
    const res = await fetch(`${API}/api/geocode?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    renderSuggestions(data.results);
  }, 200);
});

function renderSuggestions(results){
  if(!results.length){ suggestionsEl.style.display = 'none'; return; }
  suggestionsEl.innerHTML = results.map((r,i) => `
    <div class="suggestion-item" data-idx="${i}">
      <div class="suggestion-title">${r.label}</div>
      <div class="suggestion-sub">${r.police_station}${r.junction_name && r.junction_name !== 'No Junction' ? ' · ' + r.junction_name : ''}</div>
    </div>
  `).join('');
  suggestionsEl.style.display = 'block';
  [...suggestionsEl.querySelectorAll('.suggestion-item')].forEach((el, i) => {
    el.addEventListener('click', () => {
      const r = results[i];
      selectedLocation = { lat: r.latitude, lng: r.longitude, label: r.label };
      searchInput.value = r.label;
      suggestionsEl.style.display = 'none';
      map.flyTo([r.latitude, r.longitude], 15, { duration: 0.6 });
      runPrediction();
    });
  });
}

document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')) suggestionsEl.style.display = 'none';
});

// click anywhere on the map to query that point
map.on('click', (e) => {
  selectedLocation = { lat: e.latlng.lat, lng: e.latlng.lng, label: `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}` };
  searchInput.value = selectedLocation.label;
  runPrediction();
});

// timeInput.addEventListener('change', () => { if(selectedLocation) runPrediction(); });
timeInput.addEventListener('change', () => {
  if(selectedLocation) runPrediction();
  loadClusters();
});

async function runPrediction(){
  if(!selectedLocation) return;
  const when = timeInput.value; // already local ISO-ish
  const url = `${API}/api/predict?lat=${selectedLocation.lat}&lng=${selectedLocation.lng}&when=${encodeURIComponent(when)}`;
  const res = await fetch(url);
  const data = await res.json();
  showResult(selectedLocation.label, data);

  if(queryMarker) map.removeLayer(queryMarker);
  queryMarker = L.marker([selectedLocation.lat, selectedLocation.lng]).addTo(map);
}

function showResult(label, data){
  const card = document.getElementById('resultCard');
  card.classList.add('visible');
  document.getElementById('resultLocationName').textContent = label;

  const pill = document.getElementById('riskPill');
  pill.textContent = data.risk_level;
  pill.className = `risk-pill risk-${data.risk_level}`;

  document.getElementById('resultScore').textContent = data.predicted_score;

  let meta = `Severity profile: <b>${data.severity_score}</b> (${data.severity_source.replace('_',' ')})<br>`;
  meta += `Activity likelihood: <b>${data.activity_factor}</b> (${data.activity_source.replace('_',' ')})<br>`;
  if(data.nearest_cluster_id !== null && data.nearest_cluster_id !== undefined){
    meta += `Nearest known hotspot: <b>${Math.round(data.nearest_cluster_dist_m)}m</b> away`;
    if(data.historical_sample_size > 0) meta += ` · ${data.historical_sample_size} past records at this time slot`;
  } else {
    meta += `No known hotspot nearby — estimate from city-wide model`;
  }
  document.getElementById('resultMeta').innerHTML = meta;
}

// initial load
loadClusters();
</script>
